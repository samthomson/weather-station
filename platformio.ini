; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Single firmware for all stations. Station identity (WiFi, name, geohash,
; Nostr key, relay) lives in NVS and is configured at runtime via the
; dashboard; first-boot defaults come from include/factory_defaults.h.
; The compile-time sensor feature set is also defined there.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
; Larger app partition (~1.9 MB) needed for WebServer + DNS + mDNS + dashboard
board_build.partitions = min_spiffs.csv
build_flags =
    -DCONFIG_ESP32_DISABLE_BROWNOUT_DETECTOR=1

lib_deps =
    bblanchon/ArduinoJson@^6.21.3
    links2004/WebSockets@^2.4.1
    adafruit/DHT sensor library@^1.4.4
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BME280 Library@^2.2.2
    adafruit/Adafruit BMP280 Library@^2.6.8
    claws/BH1750@^1.3.0
    https://github.com/kmackay/micro-ecc.git
